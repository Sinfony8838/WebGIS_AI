<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="上海人口密度分布图">
  <defs>
    <linearGradient id="sea" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef8ff"/>
      <stop offset="1" stop-color="#b9dff0"/>
    </linearGradient>
    <style>
      .title{font:700 42px sans-serif;fill:#17324d}.sub{font:24px sans-serif;fill:#38536d}
      .label{font:20px sans-serif;fill:#17324d}.small{font:16px sans-serif;fill:#38536d}
      .boundary{stroke:#ffffff;stroke-width:6;stroke-linejoin:round}.river{fill:none;stroke:#58a8d8;stroke-width:22;stroke-linecap:round;opacity:.7}
    </style>
  </defs>
  <rect width="1200" height="900" fill="url(#sea)"/>
  <rect x="52" y="56" width="1096" height="788" rx="28" fill="#f8fbf6" stroke="#d8e6d3" stroke-width="4"/>
  <text x="96" y="120" class="title">上海人口密度分布图</text>
  <text x="98" y="158" class="sub">课前材料存储 · QGIS 制图样式示意 · 单位：人/平方千米</text>
  <path class="river" d="M160 500 C280 455 360 515 480 480 C640 430 710 500 840 455 C940 425 1010 380 1080 350"/>
  <path d="M610 240 L760 210 L930 278 L1015 405 L980 560 L850 675 L690 705 L570 620 L520 455 Z" fill="#f8c170" class="boundary"/>
  <path d="M370 278 L610 240 L520 455 L365 515 L255 415 Z" fill="#f3a35c" class="boundary"/>
  <path d="M520 455 L570 620 L460 700 L292 640 L365 515 Z" fill="#db6b43" class="boundary"/>
  <path d="M610 240 L690 130 L840 150 L930 278 L760 210 Z" fill="#ffe0a3" class="boundary"/>
  <path d="M255 415 L365 515 L292 640 L160 600 L142 465 Z" fill="#b5362f" class="boundary"/>
  <path d="M570 620 L690 705 L660 790 L470 790 L460 700 Z" fill="#8f1d2c" class="boundary"/>
  <path d="M690 705 L850 675 L1010 735 L960 815 L660 790 Z" fill="#f7d393" class="boundary"/>
  <path d="M850 675 L980 560 L1090 595 L1100 705 L1010 735 Z" fill="#ffd891" class="boundary"/>
  <path d="M980 560 L1015 405 L1095 455 L1090 595 Z" fill="#fde3b0" class="boundary"/>
  <text x="190" y="495" class="label">中心城区</text>
  <text x="430" y="372" class="label">浦西</text>
  <text x="665" y="425" class="label">浦东</text>
  <text x="705" y="182" class="label">崇明</text>
  <text x="492" y="752" class="label">闵行/奉贤</text>
  <text x="850" y="755" class="label">临港</text>
  <g transform="translate(94 690)">
    <rect x="0" y="0" width="330" height="124" rx="16" fill="#ffffff" stroke="#d8e6d3" stroke-width="3"/>
    <text x="18" y="34" class="label">人口密度等级</text>
    <rect x="18" y="52" width="42" height="22" fill="#8f1d2c"/><text x="72" y="70" class="small">极高：核心城区</text>
    <rect x="18" y="84" width="42" height="22" fill="#db6b43"/><text x="72" y="102" class="small">较高：近郊城镇带</text>
    <rect x="205" y="52" width="42" height="22" fill="#f3a35c"/><text x="258" y="70" class="small">中等</text>
    <rect x="205" y="84" width="42" height="22" fill="#ffe0a3"/><text x="258" y="102" class="small">较低</text>
  </g>
  <text x="96" y="846" class="small">说明：本图用于课堂演示上海人口密度“中心高、外围低、沿交通与城镇带扩展”的基本格局。</text>
</svg>
